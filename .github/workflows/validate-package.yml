name: Validate mod package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stage-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Stage and validate package
        run: ./tools/stage-mod.sh

      - name: List staged package contents
        run: find build/EmeraldIsle -type f | sort

      - name: Check texture path references resolve
        run: |
          rc=0
          while IFS= read -r texpath; do
            # A texPath may name a single texture or a directory of variants
            # (suffixed _a/_b or compass-direction files) under Textures/.
            if compgen -G "build/EmeraldIsle/Textures/${texpath}.png" > /dev/null \
              || compgen -G "build/EmeraldIsle/Textures/${texpath}/*.png" > /dev/null \
              || compgen -G "build/EmeraldIsle/Textures/${texpath}_*.png" > /dev/null; then
              continue
            fi
            echo "Unresolved texture path: ${texpath}" >&2
            rc=1
          done < <(grep -rhoE '<(texPath|immatureGraphicPath|uiIconPath)>[^<]+' build/EmeraldIsle/Defs \
            | sed -E 's/<[^>]+>//')
          exit "$rc"
