name: Validate mod package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stage-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Stage and validate package
        run: ./tools/stage-mod.sh

      - name: Verify release excludes developer-only assets
        run: ./tools/validate-release-safety.sh build/EmeraldIsle

      - name: List staged package contents
        run: find build/EmeraldIsle -type f | sort

      - name: Validate developer tools package
        run: ./tools/stage-dev-mod.sh

      - name: Check texture path references resolve
        run: python3 tools/validate-texture-paths.py build/EmeraldIsle
