name: Feature proposal
description: Propose a small, milestone-aligned player feature
title: "[Proposal]: "
labels: [proposal, triage]
body:
  - type: input
    id: milestone
    attributes:
      label: Target milestone
    validations:
      required: true
  - type: textarea
    id: player_value
    attributes:
      label: Player decision or story created
    validations:
      required: true
  - type: textarea
    id: inspiration
    attributes:
      label: Historical or cultural basis, if it affects the design
      description: >-
        Cite only the evidence needed for the proposed decision; leave blank when
        not applicable. For progression-facing work, name the documented cultural
        relationship being preserved or transformed. Do not create a separate
        artifact unless its risk requires one.
  - type: textarea
    id: vanilla
    attributes:
      label: Vanilla comparison and meaningful tradeoff
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Smallest coherent scope and explicit exclusions
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Implementation boundary and compatibility
      description: XML/C#, public IDs, saves, DLC/mod behavior, assets, and only the risks that apply.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Observable acceptance checks
      description: List the smallest in-game checks that prove this feature works.
    validations:
      required: true
