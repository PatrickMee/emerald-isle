name: Feature proposal
description: Approve one small, milestone-aligned player outcome
title: "[Proposal]: "
labels: [proposal, triage]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Player outcome and active milestone
      description: What decision or story does this create, and why does it belong now?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Smallest scope, exclusions, and tradeoff
      description: Include the closest vanilla alternative and why this is not a strict upgrade.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Implementation boundary and real risks
      description: >-
        Cover XML/C#, public IDs, saves, DLC/mod behavior, assets, and historical or
        cultural basis only where they affect the decision. Name explicit N/A items
        only when useful.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Observable acceptance checks
      description: List the smallest in-game checks that prove this feature works.
    validations:
      required: true
