name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities publicly. Read SECURITY.md.
  - type: input
    id: versions
    attributes:
      label: RimWorld and Emerald Isle versions
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: DLC, mod list/order, operating system, and save origin
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized evidence
    validations:
      required: true
